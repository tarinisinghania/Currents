<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background: #F9F4EE;
        }

        #canvas-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 120px;
            transition: background-color 30s ease;
            background: #F9F4EE;
        }

        .circles-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease;
        }

        .circle:hover {
            transform: translateX(-50%) scale(1.05);
        }

        @keyframes pulseSoft {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.02); }
        }

        .pulse-soft {
            animation: pulseSoft 8s ease-in-out infinite;
        }

        .tap-prompt {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            padding: 16px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 16px;
            color: #5B6A57;
            font-weight: 400;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 5000;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tap-prompt:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        #circle-info {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            z-index: 9999;
            display: none;
            min-width: 240px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        #circle-info h3 {
            margin-bottom: 15px;
            color: #5B6A57;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        #circle-info p {
            color: #7A6A64;
            font-size: 14px;
            margin: 8px 0;
            font-weight: 300;
        }

        /* time simulation bar */
        #time-sim {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(249, 244, 238, 0.96);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            font-size: 11px;
            color: #5B6A57;
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #time-sim label {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #time-input {
            width: 64px;
            padding: 4px 6px;
            border-radius: 10px;
            border: 1px solid rgba(151, 151, 151, 0.4);
            background: rgba(255,255,255,0.85);
            font-size: 11px;
            font-family: inherit;
            color: #5B6A57;
            text-align: right;
        }

        #time-suffix {
            font-variant-numeric: tabular-nums;
            opacity: 0.8;
        }

        /* clear mind button bottom-right */
        #clear-mind-btn {
            position: fixed;
            bottom: 50px;
            right: 40px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            padding: 12px 26px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 12px;
            color: #7A6A64;
            font-weight: 400;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            z-index: 5000;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        #clear-mind-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="circles-wrapper" id="circles-wrapper"></div>
    </div>

    <button class="tap-prompt" id="tap-prompt" onclick="handleTap()">
        tap to breathe
    </button>

    <!-- time simulation UI -->
    <div id="time-sim">
        <label for="time-input">hours away</label>
        <input id="time-input" type="number" min="0" max="24" step="0.5" value="0">
        <span id="time-suffix">h</span>
    </div>

    <!-- clear your mind button -->
    <button id="clear-mind-btn" onclick="handleClearMind()">
        clear your mind
    </button>

    <div id="circle-info"></div>

    <script>
        // =============== COOKIE HELPERS (YOUR ASSIGNMENT CODE) ===============
        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays*24*60*60*1000));
            let expires = "expires="+ d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }

        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }

        function checkCookie(cname) {
            return getCookie(cname) !== '';
        }

        const deleteAllCookies = () => {
            const cookies = document.cookie.split(";");
            for (const cookie of cookies) {
                const eqPos = cookie.indexOf("=");
                const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
            }
        };

        // ===================== COLOR PALETTES =====================
        const colorPalettes = {
            pink: [
                { bg: '#F9F4EE', mid: '#F3D6E3', outer: '#E3B2C7' },
                { bg: '#FAF1F4', mid: '#F0C7D9', outer: '#E09AB8' },
                { bg: '#FBE8ED', mid: '#EDB3CF', outer: '#DC7DB3' },
                { bg: '#FCE0E8', mid: '#EA9FC5', outer: '#D860A8' },
                { bg: '#FDD7E3', mid: '#E78BBB', outer: '#D4439D' },
                { bg: '#FECFDE', mid: '#E477B1', outer: '#D02692' },
                { bg: '#FFC6D9', mid: '#E163A7', outer: '#CC0987' },
                { bg: '#FFB0CA', mid: '#DE4F9D', outer: '#C8007C' }
            ],
            purple: [
                { bg: '#F5ECFA', mid: '#DEC5F0', outer: '#C4A0DD' },
                { bg: '#F3E7F8', mid: '#D9B9ED', outer: '#BD8ED9' },
                { bg: '#F1E2F6', mid: '#D4ADEA', outer: '#B67CD5' },
                { bg: '#EFDDF4', mid: '#CFA1E7', outer: '#AF6AD1' },
                { bg: '#EDD8F2', mid: '#CA95E4', outer: '#A858CD' },
                { bg: '#EBD3F0', mid: '#C589E1', outer: '#A146C9' },
                { bg: '#E9CEEE', mid: '#C07DDE', outer: '#9A34C5' },
                { bg: '#E7C9EC', mid: '#BB71DB', outer: '#9322C1' }
            ],
            blue: [
                { bg: '#EBF4FC', mid: '#C7DEF5', outer: '#A3C8E8' },
                { bg: '#E7F1FB', mid: '#BDD6F2', outer: '#93BCDF' },
                { bg: '#E3EEF9', mid: '#B3CEEF', outer: '#83B0D6' },
                { bg: '#DFEBF7', mid: '#A9C6EC', outer: '#73A4CD' },
                { bg: '#DBE8F5', mid: '#9FBEE9', outer: '#6398C4' },
                { bg: '#D7E5F3', mid: '#95B6E6', outer: '#538CBB' },
                { bg: '#D3E2F1', mid: '#8BAEE3', outer: '#4380B2' },
                { bg: '#CFDFF0', mid: '#81A6E0', outer: '#3374A9' }
            ],
            coral: [
                { bg: '#FCF0ED', mid: '#F5CFC4', outer: '#EEAE9B' },
                { bg: '#FBEAE5', mid: '#F3C3B5', outer: '#EC9F87' },
                { bg: '#FAE4DD', mid: '#F1B7A6', outer: '#EA9073' },
                { bg: '#F9DED5', mid: '#EFAB97', outer: '#E8815F' },
                { bg: '#F8D8CD', mid: '#ED9F88', outer: '#E6724B' },
                { bg: '#F7D2C5', mid: '#EB9379', outer: '#E46337' },
                { bg: '#F6CCBD', mid: '#E9876A', outer: '#E25423' },
                { bg: '#F5C6B5', mid: '#E77B5B', outer: '#E0450F' }
            ],
            sage: [
                { bg: '#F1F5EF', mid: '#C8D6C0', outer: '#A1B590' },
                { bg: '#EDF3EB', mid: '#BECFB2', outer: '#93A97D' },
                { bg: '#E9F1E7', mid: '#B4C8A4', outer: '#859D6A' },
                { bg: '#E5EFE3', mid: '#AAC196', outer: '#779157' },
                { bg: '#E1EDDF', mid: '#A0BA88', outer: '#698544' },
                { bg: '#DDEBDB', mid: '#96B37A', outer: '#5B7931' },
                { bg: '#D9E9D7', mid: '#8CAC6C', outer: '#4D6D1E' },
                { bg: '#D5E7D3', mid: '#82A55E', outer: '#3F610B' }
            ],
            sky: [
                { bg: '#F0F6FF', mid: '#D0E1FA', outer: '#B0CCF5' },
                { bg: '#EDF3FF', mid: '#C6D9F8', outer: '#A0BFF1' },
                { bg: '#EAF0FF', mid: '#BCD1F6', outer: '#90B2ED' },
                { bg: '#E7EDFF', mid: '#B2C9F4', outer: '#80A5E9' },
                { bg: '#E4EAFF', mid: '#A8C1F2', outer: '#7098E5' },
                { bg: '#E1E7FF', mid: '#9EB9F0', outer: '#608BE1' },
                { bg: '#DEE4FF', mid: '#94B1EE', outer: '#507EDD' },
                { bg: '#DBE1FF', mid: '#8AA9EC', outer: '#4071D9' }
            ],
            mint: [
                { bg: '#EEF9F4', mid: '#C2E5D4', outer: '#96D1B4' },
                { bg: '#EAF7F0', mid: '#B8E0CB', outer: '#86C7A5' },
                { bg: '#E6F5EC', mid: '#AEDBC2', outer: '#76BD96' },
                { bg: '#E2F3E8', mid: '#A4D6B9', outer: '#66B387' },
                { bg: '#DEF1E4', mid: '#9AD1B0', outer: '#56A978' },
                { bg: '#DAEFE0', mid: '#90CCA7', outer: '#469F69' },
                { bg: '#D6EDDC', mid: '#86C79E', outer: '#36955A' },
                { bg: '#D2EBD8', mid: '#7CC295', outer: '#268B4B' }
            ],
            peach: [
                { bg: '#FFF5F0', mid: '#FFDCC9', outer: '#FFC3A2' },
                { bg: '#FFF1EA', mid: '#FFD3BC', outer: '#FFB38B' },
                { bg: '#FFEDE4', mid: '#FFCAAF', outer: '#FFA374' },
                { bg: '#FFE9DE', mid: '#FFC1A2', outer: '#FF935D' },
                { bg: '#FFE5D8', mid: '#FFB895', outer: '#FF8346' },
                { bg: '#FFE1D2', mid: '#FFAF88', outer: '#FF732F' },
                { bg: '#FFDDCC', mid: '#FFA67B', outer: '#FF6318' },
                { bg: '#FFD9C6', mid: '#FF9D6E', outer: '#FF5301' }
            ]
        };

        const GROW_DURATION = 30000;
        const BASE_SIZE = 80;
        const GOLDEN_RATIO = 1.618;
        const TWO_HOURS_MS = 2 * 60 * 60 * 1000;

        let circles = [];
        let currentGrowing = null;
        let currentPalette = 'pink';
        let simulatedHours = 0;

        // for "biggest circle redraws itself" on return
        let regrowCircle = null;
        let isRegrowingOnLoad = false;

        // ===================== STATE PERSISTENCE =====================
        function loadState() {
            // circles from cookies
            const circlesCookie = getCookie('breathe_circles');
            if (circlesCookie) {
                try {
                    const parsed = JSON.parse(circlesCookie);
                    if (Array.isArray(parsed)) {
                        circles = parsed;
                    }
                } catch (e) {
                    circles = [];
                }
            }

            // -------- REAL TIME AWAY: remove biggest circle per 2 hours --------
            const lastVisitCookie = getCookie('breathe_lastVisit');
            let removedSteps = 0;

            if (lastVisitCookie && circles.length > 0) {
                const lastVisit = parseInt(lastVisitCookie, 10);
                if (!isNaN(lastVisit)) {
                    const now = Date.now();
                    const awayMs = now - lastVisit;
                    const steps = Math.floor(awayMs / TWO_HOURS_MS);

                    if (steps > 0) {
                        removedSteps = steps;
                        for (let i = 0; i < steps && circles.length > 0; i++) {
                            // remove the BIGGEST circle each 2-hour chunk
                            let biggestIndex = 0;
                            for (let j = 1; j < circles.length; j++) {
                                if (circles[j].size > circles[biggestIndex].size) {
                                    biggestIndex = j;
                                }
                            }
                            circles.splice(biggestIndex, 1);
                        }
                    }
                }
            }

            // choose a new palette each load so colors change
            const paletteKeys = Object.keys(colorPalettes);
            const lastPalette = getCookie('breathe_palette');
            let newPalette = paletteKeys[Math.floor(Math.random() * paletteKeys.length)];

            if (lastPalette && paletteKeys.length > 1) {
                const lastIdx = paletteKeys.indexOf(lastPalette);
                if (lastIdx >= 0) {
                    const others = paletteKeys.filter((_, i) => i !== lastIdx);
                    newPalette = others[Math.floor(Math.random() * others.length)];
                }
            }

            currentPalette = newPalette;
            setCookie('breathe_palette', currentPalette, 365);

            // re-apply the NEW palette to ALL saved circles
            if (circles.length > 0) {
                const palette = colorPalettes[currentPalette];
                circles = circles.map((c, i) => ({
                    ...c,
                    colors: palette[i % palette.length]
                }));
            }

            // if at least one circle disappeared while away,
            // regrow the current biggest remaining circle once on load
            if (removedSteps > 0 && circles.length > 0) {
                let biggestIndex = 0;
                for (let i = 1; i < circles.length; i++) {
                    if (circles[i].size > circles[biggestIndex].size) {
                        biggestIndex = i;
                    }
                }
                regrowCircle = { ...circles[biggestIndex] };
                isRegrowingOnLoad = true;
            }

            renderCircles();

            // start regrow animation if needed
            if (isRegrowingOnLoad && regrowCircle) {
                startRegrowAnimation();
            }
        }

        function saveState() {
            setCookie('breathe_circles', JSON.stringify(circles), 365);
            setCookie('breathe_palette', currentPalette, 365);
            setCookie('breathe_lastVisit', Date.now().toString(), 365);
        }

        // ===================== INTERACTION =====================
        function handleTap() {
            // while regrow animation is happening, ignore taps
            if (isRegrowingOnLoad || currentGrowing) return;
            startGrowingNewCircle();
        }

        function startGrowingNewCircle() {
            let targetSize;
            let colorTheme;
            const palette = colorPalettes[currentPalette];

            if (circles.length === 0) {
                targetSize = BASE_SIZE;
                colorTheme = palette[0];
            } else {
                const biggest = [...circles].sort((a, b) => b.size - a.size)[0];
                targetSize = biggest.size * GOLDEN_RATIO;
                const nextColorIndex = circles.length % palette.length;
                colorTheme = palette[nextColorIndex];
            }

            currentGrowing = {
                id: Date.now(),
                size: 0,
                maxSize: targetSize,
                createdAt: Date.now(),
                startGrowTime: Date.now(),
                colors: colorTheme,
                index: circles.length,
                mode: 'new'
            };

            document.getElementById('tap-prompt').style.display = 'none';
            animateGrowth();
        }

        // regrow the existing biggest circle on load (no new circle in data)
        function startRegrowAnimation() {
            if (!regrowCircle) return;

            currentGrowing = {
                id: regrowCircle.id,
                size: 0,
                maxSize: regrowCircle.size,
                createdAt: regrowCircle.createdAt,
                startGrowTime: Date.now(),
                colors: regrowCircle.colors,
                index: regrowCircle.index,
                mode: 'regrow'
            };

            // hide tap prompt until regrow finishes
            document.getElementById('tap-prompt').style.display = 'none';
            animateGrowth();
        }

        function animateGrowth() {
            if (!currentGrowing) return;

            const elapsed = Date.now() - currentGrowing.startGrowTime;
            const progress = Math.min(elapsed / GROW_DURATION, 1);
            const easeProgress = 1 - Math.pow(1 - progress, 3);
            currentGrowing.size = currentGrowing.maxSize * easeProgress;
           
            if (progress >= 1) {
                if (currentGrowing.mode === 'new') {
                    // add a new petal
                    circles.push({
                        id: currentGrowing.id,
                        size: currentGrowing.maxSize,
                        createdAt: currentGrowing.createdAt,
                        colors: currentGrowing.colors,
                        index: currentGrowing.index
                    });
                    saveState();
                } else if (currentGrowing.mode === 'regrow') {
                    // just finish the visual regrow, nothing changes in circles[]
                    isRegrowingOnLoad = false;
                }

                currentGrowing = null;
                document.getElementById('tap-prompt').style.display = 'block';
            } else {
                requestAnimationFrame(animateGrowth);
            }
           
            renderCircles();
        }

        // ===================== TIME SIMULATION (VISUAL ONLY) =====================
        function getSimulatedCircles() {
            const extraMs = simulatedHours * 60 * 60 * 1000;
            if (extraMs <= 0 || circles.length === 0) {
                return circles;
            }

            const steps = Math.floor(extraMs / TWO_HOURS_MS);
            if (steps === 0) return circles;

            // simulate "away" by removing BIGGEST circle each 2 hours (visual only)
            let temp = [...circles];
            for (let i = 0; i < steps && temp.length > 0; i++) {
                let biggestIndex = 0;
                for (let j = 1; j < temp.length; j++) {
                    if (temp[j].size > temp[biggestIndex].size) {
                        biggestIndex = j;
                    }
                }
                temp.splice(biggestIndex, 1);
            }
            return temp;
        }

        // ===================== CLEAR YOUR MIND =====================
        function handleClearMind() {
            // delete all cookies
            deleteAllCookies();

            // reset state in JS
            circles = [];
            currentGrowing = null;
            simulatedHours = 0;
            regrowCircle = null;
            isRegrowingOnLoad = false;

            // reset time input UI
            const timeInput = document.getElementById('time-input');
            if (timeInput) timeInput.value = 0;

            // pick a fresh random palette
            const paletteKeys = Object.keys(colorPalettes);
            currentPalette = paletteKeys[Math.floor(Math.random() * paletteKeys.length)];

            // re-render (blank garden with new base color)
            renderCircles();
        }

        // ===================== RENDERING =====================
        function renderCircles() {
            const container = document.getElementById('canvas-container');
            const wrapper = document.getElementById('circles-wrapper');

            const visibleCircles = getSimulatedCircles();
            let allCircles = [...visibleCircles];

            // if we're regrowing, temporarily hide the original static version of that circle
            if (currentGrowing && currentGrowing.mode === 'regrow') {
                allCircles = allCircles.filter(c => c.id !== currentGrowing.id);
            }

            if (currentGrowing && currentGrowing.size > 0) {
                allCircles.push({ ...currentGrowing, isGrowing: true });
            }

            if (allCircles.length > 0) {
                const largest = [...allCircles].sort((a, b) => b.size - a.size)[0];
                container.style.background = largest.colors.outer;
            } else {
                const palette = colorPalettes[currentPalette];
                container.style.background = palette[0].outer;
            }
           
            wrapper.innerHTML = '';

            const sortedCircles = [...allCircles].sort((a, b) => b.size - a.size);
           
            sortedCircles.forEach((circle, renderIndex) => {
                const div = document.createElement('div');
                div.className = 'circle';
                div.style.width = circle.size + 'px';
                div.style.height = circle.size + 'px';
                div.style.background = `
                    radial-gradient(ellipse at 50% 30%,
                        #ffffff 0%,
                        ${circle.colors.mid} 45%,
                        ${circle.colors.outer} 75%,
                        ${circle.colors.bg} 100%)
                `;
                div.style.opacity = 1;
                div.style.zIndex = 100 + renderIndex;
               
                if (!circle.isGrowing) {
                    div.classList.add('pulse-soft');
                    div.onclick = (e) => showCircleInfo(circle, e);
                }
               
                wrapper.appendChild(div);
            });
        }

        function showCircleInfo(circle, event) {
            const info = document.getElementById('circle-info');
            const createdDate = new Date(circle.createdAt);

            info.innerHTML = `
                <h3>petal ${circle.index + 1}</h3>
                <p><strong>created:</strong> ${createdDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                <p><strong>size:</strong> ${Math.round(circle.size)}px</p>
                <p><strong>palette:</strong> ${currentPalette}</p>
            `;
           
            info.style.display = 'block';
            info.style.left = event.clientX + 20 + 'px';
            info.style.top = event.clientY + 20 + 'px';
           
            setTimeout(() => {
                info.style.display = 'none';
            }, 3000);
        }

        // time sim input listener
        const timeInputEl = document.getElementById('time-input');
        timeInputEl.addEventListener('input', () => {
            let val = parseFloat(timeInputEl.value);
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            if (val > 24) val = 24;
            simulatedHours = val;
            renderCircles();
        });

        // Save on leave
        window.addEventListener('beforeunload', saveState);

        // Initial load
        loadState();
    </script>
</body>
</html>
