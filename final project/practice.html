<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SURVEILLANCE SCAN</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Inter',sans-serif;
}

body{
  position:relative;
}

/* CAMERA */

#video{
  display:none;
}

#canvas,
#overlay{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* HUD */

.topbar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  padding:18px;
  background:rgba(0,0,0,0.45);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:20;
  pointer-events:none;
}

.topbar span{
  color:#f2e8c9;
  font-size:11px;
  letter-spacing:0.22em;
  text-transform:uppercase;
}

.bottombar{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:18px;
  background:rgba(0,0,0,0.45);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:20;
  pointer-events:none;
}

.bottombar span{
  color:#f2e8c9;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
}

/* BUTTONS */

.controls{
  position:absolute;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:30;
  display:flex;
  gap:10px;
}

button{
  border:none;
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:12px 18px;
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.15);
  font-family:'Inter',sans-serif;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

button:active{
  transform:scale(0.96);
}

#flash{
  position:absolute;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:50;
}

/* PHONE ONLY */

.desktop-warning{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  z-index:999;
  font-size:14px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}

@media (min-width: 900px){
  .desktop-warning{
    display:flex;
  }

  .app{
    display:none;
  }
}
</style>
</head>

<body>

<div class="desktop-warning">
  Open this experience on your phone.
</div>

<div class="app">

  <video id="video" autoplay muted playsinline></video>

  <canvas id="canvas"></canvas>
  <canvas id="overlay"></canvas>

  <div id="flash"></div>

  <div class="topbar">
    <span>SURVEILLANCE SCAN</span>
    <span id="time"></span>
  </div>

  <div class="bottombar">
    <span>PARANOIA 100%</span>
    <span>HYPERVIGILANT · CRITICAL</span>
    <span>FEAR 100%</span>
  </div>

  <div class="controls">
    <button onclick="startCamera()">START</button>
    <button onclick="stopCamera()">STOP</button>
    <button onclick="capture()">CAPTURE</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<script>

const video=document.getElementById('video');

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

const overlay=document.getElementById('overlay');
const octx=overlay.getContext('2d');

const flash=document.getElementById('flash');

let stream=null;
let running=false;

let w=0;
let h=0;

const PIXEL=75;
const CELL=3;

const CHARS=[
'@','#','%','8','9','6','5','4','3','2','1'
];

function thermal(v){

  if(v<0.15) return [20,0,40];
  if(v<0.25) return [80,0,160];
  if(v<0.35) return [180,0,220];
  if(v<0.45) return [255,0,150];
  if(v<0.55) return [255,0,60];
  if(v<0.65) return [255,80,0];
  if(v<0.75) return [255,160,0];
  if(v<0.85) return [255,220,0];

  return [255,255,200];
}

/* SEGMENTATION */

let selfieSegmentation;
let personMask=null;
let segReady=false;
let segBusy=false;

async function initSegmentation(){

  selfieSegmentation=new SelfieSegmentation({
    locateFile:(file)=>{
      return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
    }
  });

  selfieSegmentation.setOptions({
    modelSelection:1
  });

  selfieSegmentation.onResults(onResults);

  await selfieSegmentation.initialize();

  segReady=true;
}

function onResults(results){

  const maskCanvas=document.createElement('canvas');

  maskCanvas.width=results.segmentationMask.width;
  maskCanvas.height=results.segmentationMask.height;

  const mctx=maskCanvas.getContext('2d');

  mctx.drawImage(
    results.segmentationMask,
    0,
    0
  );

  const md=mctx.getImageData(
    0,
    0,
    maskCanvas.width,
    maskCanvas.height
  ).data;

  const arr=new Float32Array(w*h);

  for(let y=0;y<h;y++){

    for(let x=0;x<w;x++){

      const mx=Math.floor(
        x*maskCanvas.width/w
      );

      const my=Math.floor(
        y*maskCanvas.height/h
      );

      arr[y*w+x]=
        md[(my*maskCanvas.width+mx)*4]/255;
    }
  }

  personMask=arr;

  segBusy=false;
}

async function sendToSegmentation(){

  if(!segReady) return;

  if(segBusy) return;

  segBusy=true;

  try{

    await selfieSegmentation.send({
      image:video
    });

  }catch(err){

    segBusy=false;

  }
}

/* CAMERA */

async function startCamera(){

  if(running) return;

  try{

    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{
          ideal:'environment'
        },
        width:{
          ideal:1920
        },
        height:{
          ideal:1080
        }
      },
      audio:false
    });

    video.srcObject=stream;

    await video.play();

    w=video.videoWidth;
    h=video.videoHeight;

    canvas.width=w;
    canvas.height=h;

    overlay.width=w;
    overlay.height=h;

    if(!segReady){

      await initSegmentation();

    }

    running=true;

    loop();

  }catch(err){

    alert('Camera access denied.');

  }
}

function stopCamera(){

  running=false;

  if(stream){

    stream.getTracks().forEach(track=>{
      track.stop();
    });

    stream=null;
  }

  ctx.clearRect(0,0,w,h);
  octx.clearRect(0,0,w,h);

  personMask=null;
}

/* LOOP */

let frame=0;

function loop(){

  if(!running) return;

  requestAnimationFrame(loop);

  if(video.readyState<2) return;

  frame++;

  if(frame%3===0){

    sendToSegmentation();

  }

  render();
}

function render(){

  ctx.drawImage(video,0,0,w,h);

  const img=ctx.getImageData(0,0,w,h);

  const d=img.data;

  if(personMask){

    /* PIXELATE ONLY PERSON */

    for(let y=0;y<h;y+=PIXEL){

      for(let x=0;x<w;x+=PIXEL){

        let found=false;

        for(let yy=0;yy<PIXEL&&!found;yy++){

          for(let xx=0;xx<PIXEL;xx++){

            const px=x+xx;
            const py=y+yy;

            if(px>=w||py>=h) continue;

            if(personMask[py*w+px]>0.35){

              found=true;
              break;
            }
          }
        }

        if(!found) continue;

        const i=(y*w+x)*4;

        const r=d[i];
        const g=d[i+1];
        const b=d[i+2];

        for(let yy=0;yy<PIXEL;yy++){

          for(let xx=0;xx<PIXEL;xx++){

            const px=x+xx;
            const py=y+yy;

            if(px>=w||py>=h) continue;

            if(personMask[py*w+px]<0.35) continue;

            const ni=(py*w+px)*4;

            d[ni]=r;
            d[ni+1]=g;
            d[ni+2]=b;
          }
        }
      }
    }
  }

  ctx.putImageData(img,0,0);

  drawNumbers(d);
}

/* THERMAL NUMBERS */

function drawNumbers(d){

  octx.clearRect(0,0,w,h);

  if(!personMask) return;

  octx.font='bold 11px Courier New';

  octx.textBaseline='top';

  for(let y=0;y<h;y+=CELL){

    for(let x=0;x<w;x+=CELL){

      if(personMask[y*w+x]<0.35) continue;

      const i=(y*w+x)*4;

      const r=d[i];
      const g=d[i+1];
      const b=d[i+2];

      const luma=(
        0.299*r+
        0.587*g+
        0.114*b
      )/255;

      const char=
        CHARS[
          Math.floor(
            luma*(CHARS.length-1)
          )
        ];

      const [tr,tg,tb]=thermal(luma);

      octx.fillStyle=
        `rgb(${tr},${tg},${tb})`;

      octx.fillText(char,x,y);
    }
  }
}

/* CAPTURE */

function capture(){

  const exportCanvas=document.createElement('canvas');

  exportCanvas.width=w;
  exportCanvas.height=h;

  const ex=exportCanvas.getContext('2d');

  ex.drawImage(canvas,0,0);

  ex.drawImage(overlay,0,0);

  flash.style.opacity='0.8';

  setTimeout(()=>{

    flash.style.transition='opacity 0.4s';

    flash.style.opacity='0';

  },50);

  const a=document.createElement('a');

  a.download='surveillance_scan.png';

  a.href=exportCanvas.toDataURL('image/png');

  a.click();
}

/* CLOCK */

function updateTime(){

  const now=new Date();

  const t=
    String(now.getHours()).padStart(2,'0')+
    ':'+
    String(now.getMinutes()).padStart(2,'0')+
    ':'+
    String(now.getSeconds()).padStart(2,'0');

  document.getElementById('time').textContent=t;
}

setInterval(updateTime,1000);

updateTime();

</script>

</body>
</html>
