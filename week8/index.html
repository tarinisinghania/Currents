<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>No Interface</title>
<style>
    body {
        margin: 0;
        background: #ffffff;
        font-family: Arial, sans-serif;
        color: #111;
        cursor: not-allowed;
        overflow: hidden;
    }

    .container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 20px;
    }

    button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 16px;
        border: 1px solid black;
        background: white;
        cursor: not-allowed;
        transition: all 0.2s;
    }

    button:hover {
        background: black;
        color: white;
    }

    .hidden {
        display: none;
    }

    .ghost {
        opacity: 0.2;
    }

</style>
</head>
<body>

<div class="container">
    <h1>This Interface Refuses You</h1>

    <button onclick="deny()">Click Me</button>
    <button onclick="deny()">Submit</button>
    <button onclick="deny()">Enter</button>
    <button onclick="deny()">Don't Click</button>

    <p id="message"></p>
</div>

<script>
    const messages = [
        "No.",
        "You are not allowed.",
        "This action has been denied.",
        "Why are you trying?",
        "There is nothing here.",
        "Stop clicking.",
        "This was never meant to work.",
        "Access refused.",
        "You don't need this.",
        "Go back."
    ];

    function deny() {
        const msg = document.getElementById("message");
        msg.innerText = messages[Math.floor(Math.random() * messages.length)];
    }

    // Fake navigation trap
    window.onbeforeunload = function () {
        return "You cannot leave.";
    };

    // Randomly move buttons to frustrate interaction
    setInterval(() => {
        const buttons = document.querySelectorAll("button");
        buttons.forEach(btn => {
            btn.style.transform = `translate(${Math.random()*200-100}px, ${Math.random()*200-100}px)`;
        });
    }, 2000);

    // Cursor lag effect
    let cursorX = 0;
    let cursorY = 0;

    document.addEventListener("mousemove", (e) => {
        cursorX += (e.clientX - cursorX) * 0.05;
        cursorY += (e.clientY - cursorY) * 0.05;
        document.body.style.backgroundPosition = `${cursorX}px ${cursorY}px`;
    });

</script>

</body>
</html>
